<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=VT323&display=swap"
      rel="stylesheet"
    />
    <link rel="shortcut icon" href="images/logo.svg" type="image/x-icon" />
    <link rel="stylesheet" href="styles.css" />
    <title>Quotes</title>
  </head>
  <body id="body">
    <header>
      <div class="sys-info">
        <span class="blink">█</span>&nbsp;QUOTE.SYS&nbsp;v1.0
      </div>
      <div class="header-right">
        <span id="clock"></span>
        <button class="mode-btn" id="modeBtn" onclick="toggleTheme()">[SWITCH TO AMBER]</button>
      </div>
    </header>

    <main>
      <div class="terminal">
        <div class="t-line dim">C:\QUOTES&gt; INITIALIZE</div>
        <div class="t-line dim small">QUOTE GENERATOR READY. AWAITING INPUT.</div>
        <div class="rule"></div>

        <div class="quote-block">
          <div class="t-line dim small" id="category"></div>
          <p id="quote" class="quote-text">_</p>
          <div id="loader" class="loader hidden">
            FETCHING<span class="dots"></span>
          </div>
          <span id="author" class="author-text"></span>
        </div>

        <div class="rule"></div>
        <div class="t-line cmd-line">
          <span class="dim">C:\QUOTES&gt;&nbsp;</span>
          <button id="getQuote" onclick="getQuote()">[ GENERATE NEW QUOTE ]</button>
          <span class="cursor blink">█</span>
        </div>
      </div>
    </main>

    <script src="script.js"></script>
  </body>
</html>
